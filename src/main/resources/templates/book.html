{% extends "base.html" %}

{% block title %} {{book.title}} {% endblock %}

{% block content %}
<div class="grid">
    <div style="display: flex; justify-content: center">
        <img style="border-radius: 0.5rem" src="//ik.imagekit.io/xdibblzhh/tr:w-1080,f-webp/f3f1c3b575a09e58f8e3381642f5c1840b150c90-900x1362.jpg" height="681" width="450" alt="book cover">
    </div>
    <div>
        <section>
            <article>
                <h5>{{book.author}}</h5>
                <h1>{{book.title}}</h1>
            </article>
            <article>
                <h6>Notes:</h6>
                {{ book.notes }}
            </article>
        </section>
        <input type="button" value="Borrow Book">
    </div>
</div>
{% endblock %}
