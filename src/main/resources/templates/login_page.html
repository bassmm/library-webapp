<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="color-scheme" content="light dark" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.red.min.css"
        />
        <title>Login</title>
    </head>
    <body>
        <main class="container" style="max-width: 480px; margin-top: 4rem;">
            <article>
                <header>
                    <h1 style="text-align: center; margin-bottom: 0;">Login</h1>
                </header>

                {% if error %}
                <small style="color: #c62828;">Invalid username or password.</small>
                {% endif %}

                <form method="post" action="/login">
                    <label for="username">Username</label>
                    <input
                        id="username"
                        name="username"
                        type="text"
                        autocomplete="username"
                        required
                    />

                    <label for="password">Password</label>
                    <input
                        id="password"
                        name="password"
                        type="password"
                        autocomplete="current-password"
                        required
                    />

                    <button type="submit">Sign in</button>
                </form>
                <small>Don't have an account? <a href="/signup_page">Sign up</a></small>
            </article>
        </main>
    </body>
</html>
