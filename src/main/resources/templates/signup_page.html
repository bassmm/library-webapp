<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="color-scheme" content="light dark" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.red.min.css"
        />
        <title>Sign Up</title>
    </head>
    <body>
        <main class="container" style="max-width: 520px; margin-top: 4rem;">
            <article>
                <header>
                    <h1 style="text-align: center; margin-bottom: 0;">Create account</h1>
                </header>

                {% if hasError %}
                <small style="color: #c62828;">{{ error }}</small>
                {% endif %}

                <form method="post" action="/signup">
                    <label for="username">Username</label>
                    <input
                        id="username"
                        name="username"
                        type="text"
                        autocomplete="username"
                        maxlength="50"
                        required
                    />

                    <label for="password">Password</label>
                    <input
                        id="password"
                        name="password"
                        type="password"
                        autocomplete="new-password"
                        maxlength="100"
                        required
                    />

                    <label for="confirm-password">Confirm password</label>
                    <input
                        id="confirm-password"
                        name="confirm_password"
                        type="password"
                        autocomplete="new-password"
                        maxlength="100"
                        required
                    />

                    <button type="submit">Sign up</button>
                </form>

                <small>Already have an account? <a href="/login_page">Log in</a></small>
            </article>
        </main>
    </body>
</html>
