<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="color-scheme" content="light dark" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.red.min.css"
        />
        <title>Logout</title>
    </head>
    <body>
        <main class="container" style="max-width: 480px; margin-top: 4rem;">
            <article>
                <header>
                    <h1 style="text-align: center; margin-bottom: 0;">Logout</h1>
                </header>
                <p>Are you sure you want to log out?</p>
                <form method="post" action="/logout">
                    <button type="submit">Yes, log me out</button>
                </form>
                <a href="/" role="button" class="secondary">Cancel</a>
            </article>
        </main>
    </body>
</html>
